# OpenClash 终极精简修正版 - 2026

# ================= 1. 锚点与定义 =================
# [策略组] 预定义列表
Anchor_OB: &Anchor_OB [自动选择, 香港自动, 日本自动, 美国自动, 韩国自动, 台湾自动, 新加坡自动, 香港手动, 日本手动, 美国手动, 韩国手动, 台湾手动, 新加坡手动, 一键代理, DIRECT]

# [健康检查] 用于订阅更新 (间隔1小时)
Anchor_PR: &Anchor_PR {type: http, interval: 3600, health-check: {enable: true, url: 'http://www.gstatic.com/generate_204', interval: 300, lazy: true}}

# [自动测速] 容差50ms，避免频繁跳动
Anchor_UT: &Anchor_UT {type: url-test, url: 'http://www.gstatic.com/generate_204', interval: 300, tolerance: 50}

# [手动选择]
Anchor_HS: &Anchor_HS {type: select}

# [正则过滤] 地区关键词
Reg_HK: &Reg_HK '(?i)香港|HK|Hong|HKG'
Reg_JP: &Reg_JP '(?i)日本|JP|Japan|Tokyo|Osaka'
Reg_US: &Reg_US '(?i)美国|US|States|USA'
Reg_KR: &Reg_KR '(?i)韩国|KR|Korea|Seoul'
Reg_TW: &Reg_TW '(?i)台湾|TW|Taiwan|Taipei'
Reg_SG: &Reg_SG '(?i)新加坡|SG|Singapore'

# ================= 2. 基础设置 =================
mixed-port: 7890
allow-lan: true
mode: rule
ipv6: true
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443], override-destination: true}
    QUIC: {ports: [443, 8443], override-destination: true}
  skip-domain: ['Mijia Cloud', '+.apple.com', '+.xiaomi.com', 'msftconnecttest.com']

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:7874
  # 已移除 proxy-server-nameserver 以解决节点全灰问题
  nameserver: [223.5.5.5, 119.29.29.29]
  fallback: [8.8.8.8, 1.1.1.1]
  fallback-filter: { geoip: true, ipcidr: [240.0.0.0/4] }
  fake-ip-filter:
    - '+.aliyun.com'
    - '+.tencent.com'
    - '+.msftconnecttest.com'
    - 'msftncsi.com'
    - '+.lan'
    - '+.local'

# ================= 3. 机场订阅 =================
proxy-providers:
  Sub: 
    <<: *Anchor_PR
    url: "你的订阅地址" 

# ================= 4. 策略组 =================
proxy-groups:
  # --- 核心入口 ---
  - {name: '一键代理', type: select, use: [Sub]}
  - {name: 'AI', type: select, proxies: *Anchor_OB}
  - {name: '流媒体', type: select, proxies: *Anchor_OB}
  - {name: 'TikTok', type: select, proxies: *Anchor_OB}
  - {name: 'GitHub', type: select, proxies: *Anchor_OB}
  - {name: '社交媒体', type: select, proxies: *Anchor_OB}
  - {name: 'Telegram', type: select, proxies: *Anchor_OB}
  - {name: '🛡️ 广告拦截', type: select, proxies: [REJECT, DIRECT]}
  - {name: '兜底分流', type: select, proxies: *Anchor_OB}

  # --- 地区自动 ---
  - {name: '自动选择', <<: *Anchor_UT, use: [Sub]}
  - {name: '香港自动', <<: *Anchor_UT, filter: *Reg_HK, use: [Sub]}
  - {name: '日本自动', <<: *Anchor_UT, filter: *Reg_JP, use: [Sub]}
  - {name: '美国自动', <<: *Anchor_UT, filter: *Reg_US, use: [Sub]}
  - {name: '韩国自动', <<: *Anchor_UT, filter: *Reg_KR, use: [Sub]}
  - {name: '台湾自动', <<: *Anchor_UT, filter: *Reg_TW, use: [Sub]}
  - {name: '新加坡自动', <<: *Anchor_UT, filter: *Reg_SG, use: [Sub]}

  # --- 地区手动 ---
  - {name: '香港手动', <<: *Anchor_HS, filter: *Reg_HK, use: [Sub]}
  - {name: '日本手动', <<: *Anchor_HS, filter: *Reg_JP, use: [Sub]}
  - {name: '美国手动', <<: *Anchor_HS, filter: *Reg_US, use: [Sub]}
  - {name: '韩国手动', <<: *Anchor_HS, filter: *Reg_KR, use: [Sub]}
  - {name: '台湾手动', <<: *Anchor_HS, filter: *Reg_TW, use: [Sub]}
  - {name: '新加坡手动', <<: *Anchor_HS, filter: *Reg_SG, use: [Sub]}

# ================= 5. 规则集 =================
rule-providers:
  ai: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml', interval: 86400 }
  github: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/GitHub/GitHub.yaml', interval: 86400 }
  media: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/GlobalMedia/GlobalMedia.yaml', interval: 86400 }
  telegram: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Telegram/Telegram.yaml', interval: 86400 }
  social: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Global/Global.yaml', interval: 86400 }
  tiktok: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/TikTok/TikTok.yaml', interval: 86400 }
  ads: { type: http, behavior: domain, url: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt', interval: 86400 }

# ================= 6. 规则匹配 =================
rules:
  - DOMAIN,copilot.microsoft.com,AI
  - DOMAIN-SUFFIX,bing.com,AI
  - RULE-SET,ai,AI
  - RULE-SET,github,GitHub
  - DOMAIN-KEYWORD,github,GitHub
  - RULE-SET,telegram,Telegram
  - RULE-SET,tiktok,TikTok
  - RULE-SET,media,流媒体
  - RULE-SET,social,社交媒体
  - RULE-SET,ads,🛡️ 广告拦截
  - DOMAIN-KEYWORD,ddns,DIRECT
  - DOMAIN-SUFFIX,aliyun.com,DIRECT
  - DOMAIN-SUFFIX,tencent.com,DIRECT
  - GEOSITE,apple,DIRECT
  - GEOSITE,microsoft,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,兜底分流
    <<: *Anchor_UT
    use: [Sub]

  - name: '香港自动'
    <<: *Anchor_UT
    filter: *Reg_HK
    use: [Sub]

  - name: '日本自动'
    <<: *Anchor_UT
    filter: *Reg_JP
    use: [Sub]

  - name: '美国自动'
    <<: *Anchor_UT
    filter: *Reg_US
    use: [Sub]

  - name: '韩国自动'
    <<: *Anchor_UT
    filter: *Reg_KR
    use: [Sub]

  - name: '台湾自动'
    <<: *Anchor_UT
    filter: *Reg_TW
    use: [Sub]

  - name: '新加坡自动'
    <<: *Anchor_UT
    filter: *Reg_SG
    use: [Sub]

  # --- 地区子组 (手动选择) ---
  - name: '香港手动'
    <<: *Anchor_HS
    filter: *Reg_HK
    use: [Sub]

  - name: '日本手动'
    <<: *Anchor_HS
    filter: *Reg_JP
    use: [Sub]

  - name: '美国手动'
    <<: *Anchor_HS
    filter: *Reg_US
    use: [Sub]

  - name: '韩国手动'
    <<: *Anchor_HS
    filter: *Reg_KR
    use: [Sub]

  - name: '台湾手动'
    <<: *Anchor_HS
    filter: *Reg_TW
    use: [Sub]

  - name: '新加坡手动'
    <<: *Anchor_HS
    filter: *Reg_SG
    use: [Sub]

# ================= 规则模块 =================
