# OpenClash 终极定型完整版 - 2026 修正

# ================= 锚点定义 =================
Anchor_PR: &Anchor_PR {type: http, interval: 3600, health-check: {enable: true, url: 'http://www.gstatic.com/generate_204', interval: 300}}

# 策略组列表锚点（已加入台湾、新加坡）
Anchor_OB: &Anchor_OB [自动选择, 香港自动, 日本自动, 美国自动, 韩国自动, 台湾自动, 新加坡自动, 香港手动, 日本手动, 美国手动, 韩国手动, 台湾手动, 新加坡手动, 一键代理, DIRECT]

Anchor_UT: &Anchor_UT {type: url-test, url: 'http://www.gstatic.com/generate_204', interval: 300, tolerance: 50}
Anchor_HS: &Anchor_HS {type: select}

# 地区识别正则补齐
Reg_HK: &Reg_HK '(?i)香港|HK|Hong|HKG|HONGKONG'
Reg_JP: &Reg_JP '(?i)日本|JP|Japan|NRT|KIX|TOK|东京|大阪'
Reg_US: &Reg_US '(?i)美国|US|States|USA|LAX|SFO|纽约'
Reg_KR: &Reg_KR '(?i)韩国|KR|Korea|首尔|SEL|KOR|春川'
Reg_TW: &Reg_TW '(?i)台湾|TW|Taiwan|Taipei|TP|新北|台中'
Reg_SG: &Reg_SG '(?i)新加坡|SG|Singapore|SIN'

# ================= 核心设置 =================
mixed-port: 7890
allow-lan: true
mode: rule
ipv6: true
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443], override-destination: true}
    QUIC: {ports: [443, 8443], override-destination: true}
  skip-domain: ['Mijia Cloud', '+.apple.com', '+.xiaomi.com', 'msftconnecttest.com', 'digicert.com']

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  proxy-server-nameserver: [223.5.5.5, 119.29.29.29]
  fake-ip-filter:
    - '+.aliyun.com'
    - '+.tencent.com'
    - '+.duckdns.org'
    - 'ifconfig.me'
    - 'api.ipify.org'
    - 'ip.sb'
    - 'v6.ident.me'
    - '+.bing.com'
    - '+.github.com'
    - '+.githubusercontent.com'
  nameserver: [223.5.5.5, 119.29.29.29]
  fallback: [8.8.8.8, 1.1.1.1]

# ================= 机场订阅 =================
proxy-providers:
  Sub: 
    <<: *Anchor_PR
    url: "你的订阅地址" 

# ================= 策略组 =================
proxy-groups:
  - name: '一键代理'
    type: select
    use: [Sub]

  - name: 'AI'
    type: select
    proxies: *Anchor_OB

  - name: '流媒体'
    type: select
    proxies: *Anchor_OB

  - name: 'TikTok'
    type: select
    proxies: *Anchor_OB

  - name: 'GitHub'
    type: select
    proxies: *Anchor_OB

  - name: '社交媒体'
    type: select
    proxies: *Anchor_OB

  - name: 'Telegram'
    type: select
    proxies: *Anchor_OB

  - name: '🛡️ 广告拦截'
    type: select
    proxies: [REJECT, DIRECT]

  - name: '兜底分流'
    type: select
    proxies: *Anchor_OB

  # --- 地区子组 (自动选择) ---
  - name: '自动选择'
    <<: *Anchor_UT
    use: [Sub]

  - name: '香港自动'
    <<: *Anchor_UT
    filter: *Reg_HK
    use: [Sub]

  - name: '日本自动'
    <<: *Anchor_UT
    filter: *Reg_JP
    use: [Sub]

  - name: '美国自动'
    <<: *Anchor_UT
    filter: *Reg_US
    use: [Sub]

  - name: '韩国自动'
    <<: *Anchor_UT
    filter: *Reg_KR
    use: [Sub]

  - name: '台湾自动'
    <<: *Anchor_UT
    filter: *Reg_TW
    use: [Sub]

  - name: '新加坡自动'
    <<: *Anchor_UT
    filter: *Reg_SG
    use: [Sub]

  # --- 地区子组 (手动选择) ---
  - name: '香港手动'
    <<: *Anchor_HS
    filter: *Reg_HK
    use: [Sub]

  - name: '日本手动'
    <<: *Anchor_HS
    filter: *Reg_JP
    use: [Sub]

  - name: '美国手动'
    <<: *Anchor_HS
    filter: *Reg_US
    use: [Sub]

  - name: '韩国手动'
    <<: *Anchor_HS
    filter: *Reg_KR
    use: [Sub]

  - name: '台湾手动'
    <<: *Anchor_HS
    filter: *Reg_TW
    use: [Sub]

  - name: '新加坡手动'
    <<: *Anchor_HS
    filter: *Reg_SG
    use: [Sub]

# ================= 规则模块 =================
rule-providers:
  ai: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml', path: ./ruleset/ai.yaml, interval: 86400 }
  github: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/GitHub/GitHub.yaml', path: ./ruleset/github.yaml, interval: 86400 }
  media: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/GlobalMedia/GlobalMedia.yaml', path: ./ruleset/media.yaml, interval: 86400 }
  telegram: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Telegram/Telegram.yaml', path: ./ruleset/telegram.yaml, interval: 86400 }
  social: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Global/Global.yaml', path: ./ruleset/social.yaml, interval: 86400 }
  tiktok: { type: http, behavior: classical, url: 'https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/TikTok/TikTok.yaml', path: ./ruleset/tiktok.yaml, interval: 86400 }
  ads: { type: http, behavior: domain, url: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt', path: ./ruleset/ads.yaml, interval: 86400 }

rules:
  # 1. AI & Bing
  - DOMAIN,copilot.microsoft.com,AI
  - DOMAIN-SUFFIX,bing.com,AI
  - RULE-SET,ai,AI
  
  # 2. GitHub
  - RULE-SET,github,GitHub
  - DOMAIN-KEYWORD,github,GitHub

  # 3. 社交 & 媒体
  - RULE-SET,telegram,Telegram
  - RULE-SET,tiktok,TikTok
  - RULE-SET,media,流媒体
  - RULE-SET,social,社交媒体

  # 4. 系统 & 直连项
  - DOMAIN-KEYWORD,ddns,DIRECT
  - DOMAIN,ifconfig.me,DIRECT
  - DOMAIN,api.ipify.org,DIRECT
  - DOMAIN,ip.sb,DIRECT
  - DOMAIN-SUFFIX,aliyun.com,DIRECT
  - DOMAIN-SUFFIX,tencent.com,DIRECT
  - GEOSITE,apple,DIRECT
  - GEOSITE,microsoft,DIRECT
  
  # 5. 广告拦截
  - RULE-SET,ads,🛡️ 广告拦截
  
  # 6. 兜底分流
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,兜底分流
