name: Sync Upstream Releases

on:
  #schedule:
    #- cron: '0 3 * * *' # 每天北京时间 11:00 自动检查
  workflow_dispatch: # 允许手动点击运行

permissions:
  contents: write # 必须赋予写入权限才能创建 Release

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
          UPSTREAM_REPO: "byJoey/ech-wk"  # UPSTREAM_REPO: "作者名/原仓库名"
        run: |
          echo "正在获取上游仓库 $UPSTREAM_REPO 的最新 Release 信息..."
          
          # 1. 获取上游最新 Release 的 Tag 名称
          LATEST_TAG=$(gh api repos/$UPSTREAM_REPO/releases/latest --jq '.tag_name')
          
          if [ -z "$LATEST_TAG" ]; then
            echo "错误：无法获取上游 Tag。"
            exit 1
          fi
          
          echo "上游最新版本为: $LATEST_TAG"

          # 2. 检查本地仓库是否已经存在该 Release
          if gh release view "$LATEST_TAG" >/dev/null 2>&1; then
            echo "版本 $LATEST_TAG 已存在，跳过同步。"
          else
            echo "发现新版本 $LATEST_TAG，开始同步..."

            # 3. 下载上游 Release 的所有文件
            mkdir -p ./sync_assets
            gh release download "$LATEST_TAG" -R "$UPSTREAM_REPO" -D ./sync_assets

            # 4. 获取上游 Release 的标题和内容 (Notes)
            REL_TITLE=$(gh api repos/$UPSTREAM_REPO/releases/latest --jq '.name')
            REL_BODY=$(gh api repos/$UPSTREAM_REPO/releases/latest --jq '.body')

            # 5. 在当前 Fork 仓库创建 Release 并上传文件
            # 注意：这会自动在你的仓库同步对应的 Git Tag
            gh release create "$LATEST_TAG" ./sync_assets/* \
              --title "$REL_TITLE" \
              --notes "$REL_BODY (Synced from $UPSTREAM_REPO)" \
              --repo ${{ github.repository }}

            echo "同步完成！"
          fi
