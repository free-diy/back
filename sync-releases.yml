name: Sync Upstream Releases

on:
  #schedule:
    #- cron: '0 3 * * *' # 每天北京时间 11:00 自动检查
  workflow_dispatch: # 允许手动点击运行

permissions:
  contents: write # 必须赋予写入权限才能创建 Release

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REPO: "RipplePiam/MobaXterm-Chinese-Simplified"
        run: |
          echo "正在获取上游仓库 $UPSTREAM_REPO 的 Release 列表..."
          
          # 获取完整的 Releases JSON 列表
          RELIASES_JSON=$(gh api repos/$UPSTREAM_REPO/releases)
          
          if [ -z "$RELIASES_JSON" ] || [ "$RELIASES_JSON" = "null" ]; then
            echo "错误：无法获取上游 Release 列表。"
            exit 1
          fi

          # 1. 提取最新的正式版 (prerelease == false 的第一项)
          LATEST_STABLE_JSON=$(echo "$RELIASES_JSON" | jq '[.[] | select(.prerelease == false)][0]')
          
          # 2. 提取最新的预发布版 (prerelease == true 的第一项)
          LATEST_PRE_JSON=$(echo "$RELIASES_JSON" | jq '[.[] | select(.prerelease == true)][0]')

          # 定义一个同步函数
          sync_release() {
            local rel_json="$1"
            if [ -z "$rel_json" ] || [ "$rel_json" = "null" ]; then
              return
            fi

            local tag_name=$(echo "$rel_json" | jq -r '.tag_name')
            local rel_title=$(echo "$rel_json" | jq -r '.name')
            local rel_body=$(echo "$rel_json" | jq -r '.body')
            local is_prerelease=$(echo "$rel_json" | jq -r '.prerelease')

            echo "----------------------------------------------"
            echo "检查版本: $tag_name (Pre-release: $is_prerelease)"

            # 检查本地是否已存在
            if gh release view "$tag_name" >/dev/null 2>&1; then
              echo "版本 $tag_name 本地已存在，跳过。"
            else
              echo "发现新版本 $tag_name，开始同步..."
              
              # 清理并创建临时下载目录
              rm -rf ./sync_assets && mkdir -p ./sync_assets
              gh release download "$tag_name" -R "$UPSTREAM_REPO" -D ./sync_assets

              # 判断预发布参数
              local prerelease_arg=""
              if [ "$is_prerelease" = "true" ]; then
                prerelease_arg="--prerelease"
              fi

              # 创建 Release
              gh release create "$tag_name" ./sync_assets/* \
                $prerelease_arg \
                --title "$rel_title" \
                --notes "$rel_body (Synced from $UPSTREAM_REPO)" \
                --repo ${{ github.repository }}

              echo "版本 $tag_name 同步成功！"
            fi
          }

          # 执行同步：分别传入最新正式版和最新预发布版
          echo "开始检查最新正式版..."
          sync_release "$LATEST_STABLE_JSON"

          echo "开始检查最新预发布版..."
          sync_release "$LATEST_PRE_JSON"
